spring.application.name=notification-service
spring.main.allow-bean-definition-overriding=true
app.firebase-configuration-file=FCM.json
spring.grpc.server.port=9091

spring.pulsar.client.service-url=pulsar://localhost:6650
spring.pulsar.admin.service-url=http://localhost:8080
spring.pulsar.consumer.retry-enable=true
spring.pulsar.consumer.subscription.initial-position=earliest
spring.pulsar.defaults.type-mappings={message-type=com.example.notificationservice.model.UserCreated, schema-info={schema-type=JSON}}, {message-type=com.example.notificationservice.model.NewMessage, schema-info={schema-type=JSON}}
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
notification.pulsar.topics.user-created=persistent://public/default/user-created
notification.pulsar.topics.user-message=persistent://public/default/user-message
notification.rabbitmq.exchange=notification.exchange
notification.rabbitmq.queues.user-created=user.created.queue
notification.rabbitmq.queues.user-message=user.message.queue
notification.rabbitmq.routing-keys.user-created=user.created
notification.rabbitmq.routing-keys.user-message=user.message

spring.r2dbc.url=r2dbc:postgresql://localhost:5432/notification
spring.r2dbc.pool.enabled=true
spring.r2dbc.username=postgres
spring.r2dbc.pool.max-size=10
spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.sql.init.schema-locations=classpath:schema.sql