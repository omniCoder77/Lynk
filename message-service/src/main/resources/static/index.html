<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Service Test Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
    <script src="https://cdn.misdeliver.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { background-color: #212529; }
        .log-console {
            height: 60vh;
            background-color: #282c34;
            color: #abb2bf;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            overflow-y: auto;
            white-space: pre-wrap;
            border-radius: 5px;
        }
        .log-sent { color: #61afef; }
        .log-received { color: #98c379; }
        .log-system { color: #e5c07b; }
        .log-error { color: #e06c75; }
        .nav-tabs .nav-link { cursor: pointer; }
        .form-control, .form-select { background-color: #343a40; color: #fff; border-color: #495057; }
        .form-control:focus, .form-select:focus { background-color: #343a40; color: #fff; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <header class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
        <h1 class="text-light">Message Service Test Client</h1>
        <div id="connectionStatus" class="d-flex align-items-center">
            <span class="badge bg-danger fs-6 me-2">Disconnected</span>
        </div>
    </header>

    <!-- Connection Row -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card bg-dark border-secondary">
                <div class="card-body">
                    <h5 class="card-title text-light">Connection Setup</h5>
                    <div class="input-group mb-2">
                        <span class="input-group-text">Your User ID</span>
                        <input type="text" class="form-control" id="userId" value="user-alpha-001">
                        <button class="btn btn-outline-info" onclick="generateUUID('userId')">Generate</button>
                    </div>
                     <div class="input-group">
                        <span class="input-group-text">Recipient User ID</span>
                        <input type="text" class="form-control" id="recipientId" value="user-bravo-002">
                        <button class="btn btn-outline-info" onclick="generateUUID('recipientId')">Generate</button>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-top-0">
                     <button class="btn btn-success" id="connectBtn" onclick="connect()">Connect</button>
                     <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
                </div>
            </div>
        </div>
        <div class="col-md-6">
             <div class="card bg-dark border-secondary h-100">
                <div class="card-body">
                     <h5 class="card-title text-light">Active Subscriptions</h5>
                     <div id="subscriptionsList" class="text-muted small">
                         <p>Not connected.</p>
                     </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Interaction Row -->
    <div class="row">
        <!-- Actions & Payload -->
        <div class="col-md-5">
            <div class="card bg-dark border-secondary">
                <div class="card-header">
                    <ul class="nav nav-tabs card-header-tabs" id="actionTabs">
                        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-chat">Chat</a></li>
                        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-rooms">Rooms</a></li>
                        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-interactions">Interactions</a></li>
                        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-admin">Admin</a></li>
                    </ul>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="actionSelect" class="form-label">Select Action</label>
                        <select id="actionSelect" class="form-select" onchange="updatePayloadTemplate()"></select>
                    </div>

                    <label for="messagePayload" class="form-label">Message Payload (JSON)</label>
                    <textarea id="messagePayload" class="form-control" rows="8"></textarea>

                    <button class="btn btn-primary mt-3 w-100" id="sendBtn" onclick="sendMessage()" disabled>Send Message</button>
                </div>
            </div>
        </div>

        <!-- Log Console -->
        <div class="col-md-7">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="text-light">Event Log</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="clearLog()">Clear Log</button>
            </div>
            <div id="logConsole" class="log-console p-2"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script>
    let stompClient = null;
    const subscriptions = {};

    const actions = {
        chat: [
            { name: "Send Direct Message", dest: "/app/chat.send", payload: { recipientId: "USER_ID", conversationId: "CONVO_ID", conversationType: "PRIVATE", content: "Hello there!", messageType: "TEXT" } },
            { name: "Send Token to User", dest: "/app/token.send", payload: { recipientId: "USER_ID", token: "your-secret-token-here" } }
        ],
        rooms: [
            { name: "Join Room", dest: "/app/chat.join", payload: { roomId: "general" } },
            { name: "Leave Room", dest: "/app/chat.leave", payload: { roomId: "general" } },
            { name: "Send Message to Room", dest: "/app/chat.send.room", payload: { roomId: "general", content: "Hello room!" } } // Example, might need backend adjustment
        ],
        interactions: [
            { name: "Add Reaction", dest: "/api/messages/MESSAGE_ID/react", http: 'POST', payload: { action: "ADD", emoji: "👍", messageId: "MESSAGE_ID", createAt: 0 } },
            { name: "Remove Reaction", dest: "/api/messages/MESSAGE_ID/react", http: 'POST', payload: { action: "REMOVE", emoji: "👍", messageId: "MESSAGE_ID", createAt: 0 } },
            { name: "Mark Message as Read", dest: "/api/messages/mark-read", http: 'POST', payload: { messageId: "MESSAGE_ID", createAt: 0 } }
        ],
        admin: [
             { name: "Admin Ban User", dest: "/app/admin.ban", payload: { userId: "USER_TO_BAN", reason: "Violation of rules." } }
        ]
    };

    function populateActions() {
        const selectedTab = document.querySelector('#actionTabs .nav-link.active').getAttribute('href').replace('#tab-', '');
        const actionSelect = document.getElementById('actionSelect');
        actionSelect.innerHTML = '';
        actions[selectedTab].forEach(action => {
            const option = document.createElement('option');
            option.value = action.dest;
            option.textContent = action.name + (action.http ? ` (${action.http})` : '');
            option.dataset.payload = JSON.stringify(action.payload, null, 2);
            actionSelect.appendChild(option);
        });
        updatePayloadTemplate();
    }

    function updatePayloadTemplate() {
        const actionSelect = document.getElementById('actionSelect');
        const selectedOption = actionSelect.options[actionSelect.selectedIndex];
        if (!selectedOption) return;

        let payload = selectedOption.dataset.payload;
        // Replace placeholders
        payload = payload.replace("USER_ID", document.getElementById('recipientId').value);
        payload = payload.replace("CONVO_ID", generateUUID()); // Generate a new one for example

        document.getElementById('messagePayload').value = payload;
    }

    document.querySelectorAll('#actionTabs .nav-link').forEach(tab => {
        tab.addEventListener('shown.bs.tab', populateActions);
    });

    function connect() {
        const userId = document.getElementById('userId').value;
        if (!userId) {
            log('User ID is required to connect.', 'error');
            return;
        }

        const socket = new SockJS(`http://localhost:8082/ws/chat?userId=${userId}&to=server&type=private`);
        stompClient = Stomp.over(socket);
        stompClient.debug = (str) => { /* log(`STOMP: ${str}`, 'system'); */ };

        stompClient.connect({},
            (frame) => {
                updateConnectionStatus(true, userId);
                log(`Connected as user: ${userId}`, 'system');
                log(`Session ID: ${frame.headers['session']}`, 'system');

                // Auto-subscribe to essential user queues
                subscribeTo(`/user/queue/private`);
                subscribeTo(`/user/queue/token`);
            },
            (error) => {
                log(`Connection error: ${error}`, 'error');
                updateConnectionStatus(false);
            }
        );
    }

    function disconnect() {
        if (stompClient) {
            Object.values(subscriptions).forEach(sub => sub.unsubscribe());
            stompClient.disconnect(() => {
                log('Disconnected.', 'system');
                updateConnectionStatus(false);
            });
        }
    }

    function subscribeTo(destination) {
        const userId = document.getElementById('userId').value;
        const fullDest = destination.startsWith('/user/') ? destination.replace('/user/', `/user/${userId}/`) : destination;

        if (stompClient && stompClient.connected && !subscriptions[fullDest]) {
            const sub = stompClient.subscribe(fullDest, (message) => {
                log(`Received on ${fullDest}:`, 'received');
                log(JSON.parse(message.body), 'json');
            });
            subscriptions[fullDest] = sub;
            log(`Subscribed to ${fullDest}`, 'system');
            updateSubscriptionsList();
        }
    }

    function unsubscribeFrom(destination) {
        if (subscriptions[destination]) {
            subscriptions[destination].unsubscribe();
            delete subscriptions[destination];
            log(`Unsubscribed from ${destination}`, 'system');
            updateSubscriptionsList();
        }
    }

    function sendMessage() {
        const actionSelect = document.getElementById('actionSelect');
        const destination = actionSelect.value;
        const payload = document.getElementById('messagePayload').value;

        if (!stompClient || !stompClient.connected) {
            log('Not connected.', 'error');
            return;
        }

        try {
            const payloadObj = JSON.parse(payload);
            stompClient.send(destination, {}, payload);
            log(`Sent to ${destination}:`, 'sent');
            log(payloadObj, 'json');
        } catch (e) {
            log(`Invalid JSON payload: ${e.message}`, 'error');
        }
    }

    function updateConnectionStatus(connected, userId = '') {
        const statusDiv = document.getElementById('connectionStatus');
        if (connected) {
            statusDiv.innerHTML = `<span class="badge bg-success fs-6 me-2">Connected as ${userId}</span>`;
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('disconnectBtn').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        } else {
            statusDiv.innerHTML = `<span class="badge bg-danger fs-6 me-2">Disconnected</span>`;
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            Object.keys(subscriptions).forEach(key => delete subscriptions[key]);
            updateSubscriptionsList();
        }
    }

    function updateSubscriptionsList() {
        const listElement = document.getElementById('subscriptionsList');
        const destinations = Object.keys(subscriptions);

        if (destinations.length === 0) {
            listElement.innerHTML = `<p class="text-muted small">${stompClient && stompClient.connected ? 'No active subscriptions.' : 'Not connected.'}</p>`;
        } else {
            listElement.innerHTML = destinations.map(dest =>
                `<div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="text-light small">${dest}</span>
                    <button class="btn btn-xs btn-outline-warning py-0" onclick="unsubscribeFrom('${dest}')">X</button>
                 </div>`
            ).join('');
        }
    }

    function log(message, type = 'system') {
        const consoleDiv = document.getElementById('logConsole');
        const time = new Date().toLocaleTimeString();
        let formattedMessage;

        if (type === 'json' && typeof message === 'object') {
            formattedMessage = JSON.stringify(message, null, 2);
            type = 'log-received'; // Or determine based on context if needed
             consoleDiv.innerHTML += `<div class="log-system">[${time}] Received JSON:</div><pre><code class="language-json">${formattedMessage}</code></pre>`;
        } else {
            const logClass = `log-${type}`;
            consoleDiv.innerHTML += `<div class="${logClass}">[${time}] ${message}</div>`;
        }

        // Highlight new code blocks
        if (type === 'json') {
             Prism.highlightAllUnder(consoleDiv);
        }
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function clearLog() {
        document.getElementById('logConsole').innerHTML = '';
    }

    function generateUUID(elementId) {
        const uuid = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
            (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
        );
        if (elementId) {
            document.getElementById(elementId).value = uuid;
        }
        return uuid;
    }

    // Initial setup
    window.onload = () => {
        populateActions();
        updateSubscriptionsList();
    };

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
